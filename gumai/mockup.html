<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>古脉 — Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F5F0E8; font-family: 'Cormorant Garamond', serif; overflow: hidden; height: 100vh; }

/* Top bar */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 5;
  background: linear-gradient(to bottom, rgba(245,240,232,0.95) 0%, rgba(245,240,232,0) 100%);
}
.logo { font-family: 'Ma Shan Zheng', serif; font-size: 24px; color: #1A1A1A; letter-spacing: 0.05em; }
.today-btn {
  background: #C23B22; color: #F5F0E8; border: none; border-radius: 6px;
  padding: 5px 12px; font-family: 'Noto Serif SC', serif; font-size: 13px;
  cursor: pointer; box-shadow: 0 2px 8px rgba(194,59,34,0.3); margin-right: 8px;
}
.icon-btn {
  background: rgba(245,240,232,0.85); border: 1px solid #C8BFB0; border-radius: 6px;
  padding: 5px 10px; cursor: pointer; font-family: 'Noto Serif SC', serif; font-size: 12px; color: #4A3A2A;
}

/* SVG map */
.map-container { width: 100vw; height: 100vh; }

/* Panel */
.panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #FAF6EF;
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 40px rgba(0,0,0,0.18);
  max-height: 72vh; display: flex; flex-direction: column;
  z-index: 20;
}
.handle { width: 40px; height: 4px; background: #C8BFB0; border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
.panel-scroll { overflow-y: auto; padding: 16px 20px 32px; flex: 1; }
.panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; gap: 12px; }
.panel-title { font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 34px; color: #1A1A1A; line-height: 1; }
.panel-pinyin { font-style: italic; font-size: 16px; color: #6A5A4A; margin-top: 3px; }
.dynasty-tag {
  font-family: 'Ma Shan Zheng', serif; font-size: 13px; color: #F5F0E8;
  background: #4A3A2A; padding: 3px 10px; border-radius: 4px; white-space: nowrap; margin-top: 4px;
}
.panel-english { font-style: italic; font-size: 14px; color: #6A5A4A; margin: 0 0 12px; }
.divider { height: 1px; background: #D4C8B8; margin: 12px 0; opacity: 0.6; }

/* Challenge: reconstruct */
.slots { display: flex; gap: 10px; justify-content: center; margin: 12px 0; }
.slot {
  width: 54px; height: 54px; border-radius: 6px; border: 2px solid #2A2A2A;
  display: flex; align-items: center; justify-content: center;
  background: #1A1A1A;
}
.slot.empty { background: transparent; border-color: #C8BFB0; }
.slot-char { font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 26px; color: #F5F0E8; }
.tile-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 320px; margin: 0 auto 16px; }
.tile {
  width: 58px; height: 58px; border-radius: 8px; border: 1.5px solid #8A7A6A;
  background: #F5F0E8; font-family: 'Noto Serif SC', serif; font-weight: 600;
  font-size: 26px; color: #1A1A1A; cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12); display: flex; align-items: center; justify-content: center;
}
.tile.used { opacity: 0.25; transform: scale(0.9); }
.hint-text { font-style: italic; font-size: 13px; color: #6A5A4A; text-align: center; }

/* Map pulse animation */
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.7} }

/* Fog of war toggle */
.state-label {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 12px; color: #8A7A6A; z-index: 3;
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="logo">古脉</span>
  <div>
    <button class="today-btn">今日</button>
    <button class="icon-btn">年鉴</button>
  </div>
</div>

<!-- SVG map -->
<svg class="map-container" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="fogBlur">
      <feGaussianBlur stdDeviation="3"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <filter id="inkBleed">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <style>
      @keyframes pulse { 0%,100%{opacity:0.3;r:24} 50%{opacity:0.7;r:28} }
      .pulse-ring { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Dynasty timeline -->
  <line x1="80" y1="490" x2="720" y2="490" stroke="#8A7A6A" stroke-width="0.5" opacity="0.25"/>
  <text x="150" y="508" text-anchor="middle" font-family="Ma Shan Zheng, serif" font-size="14" fill="#8A7A6A" opacity="0.4">春秋</text>
  <text x="320" y="508" text-anchor="middle" font-family="Ma Shan Zheng, serif" font-size="14" fill="#8A7A6A" opacity="0.4">战国</text>
  <text x="500" y="508" text-anchor="middle" font-family="Ma Shan Zheng, serif" font-size="14" fill="#8A7A6A" opacity="0.4">商</text>

  <!-- Connection: 韩非子 → 守株待兔 (revealed, brushstroke) -->
  <path d="M 310 270 Q 270 290 230 320" stroke="#2A2A2A" stroke-width="1.2" fill="none" opacity="0.45" stroke-linecap="round"/>
  <!-- Connection: 木 → 守株待兔 (revealed) -->
  <path d="M 490 260 Q 380 270 230 320" stroke="#2A2A2A" stroke-width="1.2" fill="none" opacity="0.45" stroke-linecap="round"/>
  <!-- Hidden connection stub (not yet unlocked — faint) -->
  <path d="M 600 200 Q 550 260 490 260" stroke="#2A2A2A" stroke-width="0.5" fill="none" opacity="0.08" stroke-linecap="round"/>

  <!-- Node 1: 守株待兔 — completed -->
  <circle cx="230" cy="320" r="18" fill="#1A1A1A" opacity="0.08" filter="url(#inkBleed)"/>
  <circle cx="230" cy="320" r="22" fill="none" stroke="#C23B22" stroke-width="0.8" opacity="0.35" stroke-dasharray="3 4"/>
  <circle cx="230" cy="320" r="18" fill="#2A2A2A" opacity="1" filter="url(#inkBleed)"/>
  <text x="230" y="320" text-anchor="middle" dominant-baseline="central"
        font-family="Noto Serif SC, serif" font-weight="700" font-size="11" fill="#F5F0E8" opacity="0.95">守株</text>
  <text x="230" y="344" text-anchor="middle" font-family="Cormorant Garamond, serif"
        font-style="italic" font-size="9" fill="#4A4A4A" opacity="0.7">shǒu zhū dài tù</text>

  <!-- Node 2: 韩非子 — completed -->
  <circle cx="310" cy="270" r="22" fill="none" stroke="#C23B22" stroke-width="0.8" opacity="0.35" stroke-dasharray="3 4"/>
  <circle cx="310" cy="270" r="18" fill="#1A1A2E" opacity="1" filter="url(#inkBleed)"/>
  <text x="310" y="270" text-anchor="middle" dominant-baseline="central"
        font-family="Noto Serif SC, serif" font-weight="700" font-size="11" fill="#F5F0E8" opacity="0.95">韩非</text>
  <text x="310" y="294" text-anchor="middle" font-family="Cormorant Garamond, serif"
        font-style="italic" font-size="9" fill="#4A4A4A" opacity="0.7">Hán Fēizǐ</text>

  <!-- Node 3: 木 — TODAY (pulsing, uncompleted) -->
  <circle cx="490" cy="260" r="28" fill="none" stroke="#C23B22" stroke-width="1.5" class="pulse-ring"/>
  <circle cx="490" cy="260" r="16" fill="#1E2A1A" opacity="0.9" filter="url(#inkBleed)"/>
  <text x="490" y="260" text-anchor="middle" dominant-baseline="central"
        font-family="Noto Serif SC, serif" font-weight="700" font-size="20" fill="#F5F0E8" opacity="0.95">木</text>

  <!-- Node 4: unknown — fogged -->
  <circle cx="600" cy="200" r="14" fill="#2A1A1A" opacity="0.25" filter="url(#fogBlur)"/>
  <text x="600" y="200" text-anchor="middle" dominant-baseline="central"
        font-family="Noto Serif SC, serif" font-weight="700" font-size="12" fill="#F5F0E8" opacity="0.3"
        filter="url(#fogBlur)">？</text>

  <!-- Node 5: unknown — fogged, further -->
  <circle cx="550" cy="370" r="14" fill="#2A2A1A" opacity="0.18" filter="url(#fogBlur)"/>
  <text x="550" y="370" text-anchor="middle" dominant-baseline="central"
        font-family="Noto Serif SC, serif" font-weight="700" font-size="12" fill="#F5F0E8" opacity="0.2"
        filter="url(#fogBlur)">？</text>
</svg>

<!-- Challenge panel (state: challenge for 木) -->
<div class="panel" id="panel">
  <div class="handle"></div>
  <div class="panel-scroll">
    <div class="panel-header">
      <div>
        <div class="panel-title">木</div>
        <!-- pinyin hidden during challenge -->
      </div>
      <span class="dynasty-tag">商</span>
    </div>
    <p class="panel-english">Tree; wood. One of the oldest pictographs and a foundational radical.</p>
    <div class="divider"></div>

    <!-- Reconstruct challenge (showing match_radical for 木 instead) -->
    <p style="font-family:'Noto Serif SC',serif;font-size:15px;color:#1A1A1A;margin:0 0 16px;text-align:center;line-height:1.6;">
      In its earliest oracle bone form, 木 was a pictograph of what?
    </p>

    <!-- 3 options -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:#F5F0E8;border:1.5px solid #C8BFB0;border-radius:8px;cursor:pointer;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
        <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:#8A7A6A;min-width:18px;">A</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:15px;color:#1A1A1A;line-height:1.5;">A tree with branches above and roots below</span>
      </button>
      <button style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:#F5F0E8;border:1.5px solid #C8BFB0;border-radius:8px;cursor:pointer;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
        <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:#8A7A6A;min-width:18px;">B</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:15px;color:#1A1A1A;line-height:1.5;">A person standing with arms outstretched</span>
      </button>
      <button style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:#F5F0E8;border:1.5px solid #C8BFB0;border-radius:8px;cursor:pointer;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
        <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:#8A7A6A;min-width:18px;">C</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:15px;color:#1A1A1A;line-height:1.5;">A house with a peaked roof</span>
      </button>
    </div>
  </div>
</div>

</body>
</html>
